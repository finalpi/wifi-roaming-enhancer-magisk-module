<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WiFi Roaming Enhancer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <header>
        <h1>WiFi Roaming Enhancer</h1>
        <p class="subtitle">弱 Wi‑Fi 自动避开：信号太弱就临时不连接，信号恢复后自动允许连接。</p>
    </header>

    <section class="card">
        <h2>常用设置</h2>
        <form id="configForm">
            <div class="grid">
                <label>
                    功能开关
                    <select name="ENABLED">
                        <option value="1" selected>开启</option>
                        <option value="0">关闭</option>
                    </select>
                </label>
                <label>
                    控制模式
                    <select name="CONTROL_MODE">
                        <option value="auto" selected>自动：优先临时禁用，失败后重启 Wi‑Fi</option>
                        <option value="wpa_cli">仅临时禁用弱网络</option>
                        <option value="wifi_restart">仅弱信号重启 Wi‑Fi</option>
                    </select>
                </label>
                <label>
                    弱信号阈值
                    <input name="DISABLE_RSSI" type="number" min="-100" max="-30" value="-75">
                </label>
                <label>
                    扫描间隔，秒
                    <input name="SCAN_INTERVAL" type="number" min="5" max="300" value="10">
                </label>
            </div>

            <p class="help">
                推荐保持默认值：低于 <b>-75 dBm</b> 认为信号弱。
                自动模式会优先尝试临时禁用弱网络；如果设备不支持，则在弱信号时重启 Wi‑Fi。数值越接近 0 表示信号越强，例如 -60 比 -80 强。
            </p>

            <details>
                <summary>高级设置，一般不用改</summary>
                <div class="grid advanced-grid">
                    <label>
                        Wi‑Fi 网卡名
                        <input name="WIFI_IFACE" value="auto" placeholder="auto 或 wlan0">
                    </label>
                    <label>
                        临时禁用恢复阈值
                        <input name="RECOVERY_RSSI" type="number" min="-100" max="-30" value="-67">
                    </label>
                    <label>
                        Wi‑Fi 关闭等待时间，秒
                        <input name="FALLBACK_WIFI_OFF_SECONDS" type="number" min="1" max="120" value="3">
                    </label>
                    <label>
                        重启冷却时间，秒
                        <input name="FALLBACK_COOLDOWN_SECONDS" type="number" min="30" max="3600" value="120">
                    </label>
                    <label>
                        连续弱信号次数
                        <input name="FALLBACK_WEAK_COUNT" type="number" min="1" max="10" value="2">
                    </label>
                    <label>
                        至少保留可用网络数
                        <input name="MIN_AVAILABLE_NETWORKS" type="number" min="1" max="20" value="1">
                    </label>
                    <label>
                        每轮最多禁用数量
                        <input name="MAX_DISABLE_PER_SCAN" type="number" min="1" max="20" value="3">
                    </label>
                    <label>
                        日志开关
                        <select name="LOG_ENABLED">
                            <option value="1" selected>开启</option>
                            <option value="0">关闭</option>
                        </select>
                    </label>
                    <label>
                        最大日志行数
                        <input name="LOG_MAX_LINES" type="number" min="50" max="1000" value="200">
                    </label>
                </div>
            </details>

            <div class="actions">
                <button type="submit">保存设置</button>
                <button type="button" class="secondary" id="refreshBtn">刷新状态</button>
                <button type="button" class="secondary" id="startBtn">启动后台服务</button>
                <button type="button" class="danger" id="reenableBtn">恢复所有临时禁用网络</button>
            </div>
        </form>
        <p id="message" class="message">如果页面刚打开没有读到配置，会先显示推荐默认值。</p>
    </section>

    <section class="card">
        <h2>当前状态</h2>
        <pre id="status">等待刷新…</pre>
    </section>

    <section class="card">
        <h2>本模块临时禁用的网络</h2>
        <pre id="disabled">无</pre>
    </section>

    <section class="card">
        <h2>最近日志</h2>
        <pre id="logs">暂无日志</pre>
    </section>
</main>

<script>
const form = document.getElementById('configForm');
const message = document.getElementById('message');

function setMessage(text, ok = true) {
    message.textContent = text;
    message.className = ok ? 'message ok' : 'message error';
}

function shellQuote(value) {
    return "'" + String(value).replace(/'/g, "'\\''") + "'";
}

async function execShell(command) {
    if (window.ksu && typeof window.ksu.exec === 'function') {
        const result = await window.ksu.exec(command);
        if (typeof result === 'string') return result;
        return result.stdout || result.out || result.result || '';
    }

    const response = await fetch('action.sh?' + encodeURIComponent(command));
    return response.text();
}

async function callAction(args) {
    const action = '/data/adb/modules/wifi_roaming_enhancer/webroot/action.sh';
    const command = '/system/bin/sh ' + shellQuote(action) + ' ' + args.map(shellQuote).join(' ');
    const output = await execShell(command);
    return JSON.parse(output.trim() || '{}');
}

function fillConfig(config) {
    if (config.enabled !== undefined) form.ENABLED.value = String(config.enabled);
    if (config.control_mode !== undefined) form.CONTROL_MODE.value = config.control_mode;
    if (config.wifi_iface !== undefined) form.WIFI_IFACE.value = config.wifi_iface;
    if (config.scan_interval !== undefined) form.SCAN_INTERVAL.value = config.scan_interval;
    if (config.disable_rssi !== undefined) form.DISABLE_RSSI.value = config.disable_rssi;
    if (config.recovery_rssi !== undefined) form.RECOVERY_RSSI.value = config.recovery_rssi;
    if (config.min_available_networks !== undefined) form.MIN_AVAILABLE_NETWORKS.value = config.min_available_networks;
    if (config.max_disable_per_scan !== undefined) form.MAX_DISABLE_PER_SCAN.value = config.max_disable_per_scan;
    if (config.fallback_wifi_off_seconds !== undefined) form.FALLBACK_WIFI_OFF_SECONDS.value = config.fallback_wifi_off_seconds;
    if (config.fallback_cooldown_seconds !== undefined) form.FALLBACK_COOLDOWN_SECONDS.value = config.fallback_cooldown_seconds;
    if (config.fallback_weak_count !== undefined) form.FALLBACK_WEAK_COUNT.value = config.fallback_weak_count;
    if (config.log_enabled !== undefined) form.LOG_ENABLED.value = String(config.log_enabled);
    if (config.log_max_lines !== undefined) form.LOG_MAX_LINES.value = config.log_max_lines;
}

async function loadConfig() {
    const config = await callAction(['get_config']);
    fillConfig(config);
}

async function loadStatus() {
    const data = await callAction(['get_status']);
    const status = data.status || '暂无状态。等待后台服务完成一次扫描后再刷新。';
    const running = data.running ? '后台服务：运行中' : '后台服务：未运行，点“启动后台服务”或重启手机';
    document.getElementById('status').textContent = running + '\n' + status;
    document.getElementById('disabled').textContent = data.disabled || '无';
    document.getElementById('logs').textContent = data.logs || '暂无日志。';
}

async function refreshAll() {
    try {
        await loadConfig();
        await loadStatus();
        setMessage('已刷新。');
    } catch (error) {
        setMessage('未能读取后台配置，页面已显示推荐默认值。请确认是从 KernelSU 的模块 WebUI 打开。' + error, false);
    }
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = new FormData(form);
    const args = ['save_config'];
    for (const [key, value] of data.entries()) {
        args.push(key + '=' + value);
    }

    try {
        const result = await callAction(args);
        setMessage(result.message || '已保存，后台服务会在下一轮扫描自动读取。', result.ok !== false);
        await refreshAll();
    } catch (error) {
        setMessage('保存失败：' + error, false);
    }
});

document.getElementById('refreshBtn').addEventListener('click', refreshAll);

document.getElementById('startBtn').addEventListener('click', async () => {
    try {
        const result = await callAction(['start_service']);
        setMessage(result.message || '已请求启动后台服务。', result.ok !== false);
        await loadStatus();
    } catch (error) {
        setMessage('启动失败：' + error, false);
    }
});

document.getElementById('reenableBtn').addEventListener('click', async () => {
    try {
        const result = await callAction(['reenable_all']);
        setMessage(result.message || '已恢复。', result.ok !== false);
        await loadStatus();
    } catch (error) {
        setMessage('恢复失败：' + error, false);
    }
});

refreshAll();
</script>
</body>
</html>
