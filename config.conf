# WiFi Roaming Enhancer configuration
# RSSI values are dBm. Higher is better: -60 is stronger than -80.

# 1 enables weak Wi-Fi avoidance, 0 disables it without uninstalling the module.
ENABLED=1

# Use auto for interface detection, or set a fixed interface such as wlan0.
WIFI_IFACE=auto

# Seconds between scans. Valid range: 5-300.
SCAN_INTERVAL=10

# Temporarily disable saved networks when their best visible RSSI is below this value.
DISABLE_RSSI=-75

# Re-enable module-disabled networks when their best visible RSSI reaches this value.
# Keep this higher than DISABLE_RSSI to avoid flapping.
RECOVERY_RSSI=-67

# Keep at least this many visible saved networks enabled.
MIN_AVAILABLE_NETWORKS=1

# Maximum networks to disable during one scan cycle.
MAX_DISABLE_PER_SCAN=3

# Local diagnostic logging under state/service.log.
LOG_ENABLED=1
LOG_MAX_LINES=200
